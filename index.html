<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>✨ A Bolsa Amarela — Guarde suas vontades ✨</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #f9e7b3, #f5c98e);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Comic Neue', cursive;
            padding: 12px;
        }

        .game-wrapper {
            background: #fff8e7;
            border-radius: 48px;
            padding: 16px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2), inset 0 1px 4px rgba(255,245,200,0.8);
            width: 100%;
            max-width: 600px;
            margin: auto;
        }

        .title {
            text-align: center;
            font-size: clamp(1.3rem, 6vw, 1.8rem);
            font-weight: bold;
            color: #b45f2b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .title span {
            font-size: clamp(1.6rem, 7vw, 2.2rem);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            background: #fef0cf;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
            width: 100%;
            height: auto;
            aspect-ratio: 550 / 450;
        }

        .bag-counter {
            background: #f3cd81;
            padding: 12px 18px;
            border-radius: 60px;
            font-weight: bold;
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            color: #3e2a1f;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: center;
            margin: 16px 0 12px 0;
        }

        .button-wrapper {
            margin-bottom: 16px;
        }

        button {
            background: #f3b33d;
            border: none;
            font-size: clamp(1rem, 4.5vw, 1.2rem);
            font-weight: bold;
            padding: 14px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.1s linear;
            color: #2c1a0c;
            box-shadow: 0 4px 0 #a45d2a;
            width: 100%;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #a45d2a;
        }

        .message-area {
            background: #f7e5c2;
            padding: 14px 16px;
            border-radius: 32px;
            font-style: italic;
            font-weight: 500;
            color: #8b5a2b;
            text-align: center;
            font-size: clamp(0.9rem, 4.5vw, 1.1rem);
            min-height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            margin-top: 8px;
            cursor: pointer;
            transition: 0.1s;
        }

        .message-area:active {
            background: #efdaae;
        }

        .quote {
            text-align: center;
            margin-top: 14px;
            font-size: clamp(0.7rem, 3.5vw, 0.85rem);
            color: #b47c48;
            background: #fff1dd;
            border-radius: 60px;
            padding: 8px 12px;
        }

        .hint {
            text-align: center;
            font-size: 0.7rem;
            color: #c49a6c;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <div class="title">
            <span>👜</span> A Bolsa Amarela <span>✨</span>
        </div>
        
        <canvas id="bagCanvas" width="550" height="450" style="width:100%; height:auto; aspect-ratio:550/450"></canvas>
        
        <div class="bag-counter">
            🧡 <span id="vontadeCount">0</span> vontade(s)
        </div>
        
        <div class="button-wrapper">
            <button id="resetBtn">🌼 Nova Bolsa</button>
        </div>
        
        <div class="message-area" id="mensagemPoetica">
            💭 “Toque nos desejos que flutuam”
        </div>
        
        <div class="quote">
            📖 inspirado em "A Bolsa Amarela" — Lygia Bojunga 🌟
        </div>
        <div class="hint">
            ✨ Toque na mensagem para trocar 💬
        </div>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('bagCanvas');
        const ctx = canvas.getContext('2d');
        
        const width = 550;
        const height = 450;
        canvas.width = width;
        canvas.height = height;
        
        let vontadesGuardadas = 0;
        let vontadesAtivas = [];
        let desejosVoando = []; // { x, y, targetX, targetY, emoji, progresso, velocidade }
        let frames = 0;
        let animationId = null;
        let mensagemAtual = "💭 “Toque nos desejos que flutuam”";
        
        const MAX_VONTADES_TELA = 6;
        const SPAWN_RATE = 95;
        
        const listaVontades = [
            { emoji: "🐺", titulo: "ser lobo", cor: "#b87c4f" },
            { emoji: "✈️", titulo: "voar", cor: "#6aa3b4" },
            { emoji: "📖", titulo: "escrever", cor: "#e3b87c" },
            { emoji: "🎨", titulo: "pintar", cor: "#d99e4e" },
            { emoji: "🌊", titulo: "mar", cor: "#5f9db2" },
            { emoji: "🚀", titulo: "lua", cor: "#b39f7a" },
            { emoji: "🎭", titulo: "outra pessoa", cor: "#c2847a" },
            { emoji: "🧸", titulo: "nunca crescer", cor: "#cca66b" },
            { emoji: "🌈", titulo: "arco-íris", cor: "#d9ae6c" },
            { emoji: "🔮", titulo: "magia", cor: "#b189c9" },
            { emoji: "🎪", titulo: "circo", cor: "#e3a05e" },
            { emoji: "🍰", titulo: "doce", cor: "#e2b56a" },
            { emoji: "⭐", titulo: "ser estrela", cor: "#efc47c" },
            { emoji: "🎵", titulo: "cantar", cor: "#c9a87b" }
        ];
        
        const countSpan = document.getElementById('vontadeCount');
        const msgDiv = document.getElementById('mensagemPoetica');
        
        const bolsa = {
            x: width/2,
            y: height - 70,
            radius: 54,
            brilhoAtivo: 0
        };
        
        const frasesBoas = [
            "Guardou na bolsa amarela! 💛", "Essa vontade é sua!", "A bolsa acolheu ✨",
            "Ninguém vai tirar.", "Livre pra querer! 🌻", "Que tesouro!",
            "Ela sorriu.", "Mais uma vontade segura.", "Obrigada por guardar."
        ];
        
        // Mensagem permanente até clique
        function setMensagemPermanente(texto, cor = "#8b5a2b") {
            mensagemAtual = `💭 “${texto}”`;
            msgDiv.innerHTML = mensagemAtual;
            msgDiv.style.color = cor;
        }
        
        function avancarMensagem() {
            // Se a mensagem atual for a padrão, não muda; se for uma mensagem especial, volta para a padrão
            if(mensagemAtual.includes("Toque nos desejos")) {
                // mostra uma dica alternativa
                const dicas = [
                    "✨ Toque nos círculos coloridos ✨",
                    "👜 Cada desejo vai voar pra bolsa!",
                    "🌟 Você pode guardar quantas vontades quiser",
                    "💛 A bolsa aceita tudo o que você quer"
                ];
                const nova = dicas[Math.floor(Math.random() * dicas.length)];
                setMensagemPermanente(nova, "#a5713a");
            } else {
                setMensagemPermanente("Toque nos desejos que flutuam", "#8b5a2b");
            }
        }
        
        function updateUI() {
            countSpan.innerText = vontadesGuardadas;
        }
        
        function spawnVontade() {
            if(vontadesAtivas.length >= MAX_VONTADES_TELA) return;
            const idx = Math.floor(Math.random() * listaVontades.length);
            const obj = listaVontades[idx];
            const radius = 34;
            const x = 45 + Math.random() * (width - 90);
            const y = -radius - Math.random() * 60;
            const vy = 0.65 + Math.random() * 1.0;
            vontadesAtivas.push({
                x, y, radius,
                emoji: obj.emoji,
                titulo: obj.titulo,
                vy: vy,
                corFundo: obj.cor,
                id: Math.random()
            });
        }
        
        function updateMovimento() {
            // Atualiza vontades comuns
            for(let i = 0; i < vontadesAtivas.length; i++) {
                const v = vontadesAtivas[i];
                v.y += v.vy;
                if(v.y - v.radius > height + 70 || v.y + v.radius < -70) {
                    vontadesAtivas.splice(i,1);
                    i--;
                }
            }
            
            // Atualiza desejos voando
            for(let i = 0; i < desejosVoando.length; i++) {
                const d = desejosVoando[i];
                d.progresso += d.velocidade;
                if(d.progresso >= 1) {
                    // chegou na bolsa!
                    desejosVoando.splice(i,1);
                    i--;
                    bolsa.brilhoAtivo = 15;
                } else {
                    // interpola posição
                    d.x = d.startX + (d.targetX - d.startX) * d.progresso;
                    d.y = d.startY + (d.targetY - d.startY) * d.progresso;
                }
            }
        }
        
        function guardarDesejo(v, idx) {
            const frase = frasesBoas[Math.floor(Math.random() * frasesBoas.length)];
            setMensagemPermanente(`${v.titulo}: ${frase}`, "#c07a3a");
            
            // Cria efeito de voo
            desejosVoando.push({
                startX: v.x,
                startY: v.y,
                targetX: bolsa.x,
                targetY: bolsa.y - 15,
                emoji: v.emoji,
                progresso: 0,
                velocidade: 0.05 // 20 frames até chegar
            });
            
            vontadesGuardadas++;
            updateUI();
            vontadesAtivas.splice(idx, 1);
        }
        
        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            
            if(e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            
            if(canvasX < 0 || canvasX > width || canvasY < 0 || canvasY > height) return;
            
            // Verifica clique em desejos
            for(let i = 0; i < vontadesAtivas.length; i++) {
                const v = vontadesAtivas[i];
                const dx = canvasX - v.x;
                const dy = canvasY - v.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < v.radius) {
                    guardarDesejo(v, i);
                    return;
                }
            }
            
            // Clicou fora: mensagem amigável
            setMensagemPermanente("Toque nos círculos coloridos e veja a mágica! 🎈", "#b47c48");
        }
        
        function drawBag() {
            ctx.shadowBlur = 10;
            ctx.shadowColor = "rgba(0,0,0,0.15)";
            ctx.beginPath();
            ctx.ellipse(bolsa.x, bolsa.y, bolsa.radius, bolsa.radius*0.85, 0, 0, Math.PI*2);
            ctx.fillStyle = "#f7c56e";
            ctx.fill();
            ctx.fillStyle = "#e5b04b";
            ctx.beginPath();
            ctx.ellipse(bolsa.x-6, bolsa.y-8, 11, 9, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(bolsa.x+6, bolsa.y-8, 11, 9, 0, 0, Math.PI*2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.ellipse(bolsa.x, bolsa.y-28, 34, 16, 0, 0, Math.PI*2);
            ctx.fillStyle = "#db9f48";
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(bolsa.x, bolsa.y-28, 25, 9, 0, 0, Math.PI*2);
            ctx.fillStyle = "#f7cd88";
            ctx.fill();
            
            ctx.fillStyle = "#ffdb9e";
            ctx.beginPath();
            ctx.ellipse(bolsa.x, bolsa.y-6, 18, 11, 0, 0, Math.PI*2);
            ctx.fill();
            
            if(bolsa.brilhoAtivo > 0) {
                ctx.beginPath();
                ctx.ellipse(bolsa.x+12, bolsa.y-14, 12, 8, 0, 0, Math.PI*2);
                ctx.fillStyle = "#fff5cf";
                ctx.fill();
                bolsa.brilhoAtivo--;
                // brilho extra
                ctx.beginPath();
                ctx.ellipse(bolsa.x-10, bolsa.y-10, 8, 6, 0, 0, Math.PI*2);
                ctx.fill();
            }
            
            ctx.fillStyle = "#6b3f1c";
            ctx.beginPath();
            ctx.arc(bolsa.x-16, bolsa.y-6, 3.8, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(bolsa.x+16, bolsa.y-6, 3.8, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(bolsa.x-17.5, bolsa.y-8, 1.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(bolsa.x+14.5, bolsa.y-8, 1.5, 0, Math.PI*2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(bolsa.x, bolsa.y+3, 10, 0.05, Math.PI - 0.05);
            ctx.strokeStyle = "#8b5a2b";
            ctx.lineWidth = 2.2;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        
        function drawVontades() {
            // desenha desejos normais
            for(let v of vontadesAtivas) {
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(v.x, v.y, v.radius-3, 0, Math.PI*2);
                ctx.fillStyle = v.corFundo + "cc";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(v.x, v.y, v.radius-6, 0, Math.PI*2);
                ctx.fillStyle = "#fff5e0";
                ctx.fill();
                ctx.font = `${Math.floor(v.radius * 0.75)}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
                ctx.fillStyle = "#2d2418";
                ctx.fillText(v.emoji, v.x-16, v.y+12);
                ctx.font = `bold 11px "Quicksand", system-ui`;
                ctx.fillStyle = "#4a311c";
                ctx.fillText(v.titulo, v.x-22, v.y+30);
            }
            
            // desenha desejos voando
            for(let d of desejosVoando) {
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(d.x, d.y, 22, 0, Math.PI*2);
                ctx.fillStyle = "#ffdd99cc";
                ctx.fill();
                ctx.font = `28px "Segoe UI Emoji", "Apple Color Emoji"`;
                ctx.fillStyle = "#5c3e1f";
                ctx.fillText(d.emoji, d.x-14, d.y+10);
                // rastro de estrelas
                ctx.fillStyle = "#ffcc66";
                for(let s=0;s<3;s++) {
                    ctx.beginPath();
                    ctx.arc(d.x - 8 + s*8, d.y-5, 2, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
        }
        
        function drawBackground() {
            ctx.fillStyle = "#fdebb3";
            ctx.fillRect(0,0,width,height);
            ctx.fillStyle = "#f3cf93";
            ctx.fillRect(0, height-38, width, 38);
            for(let i=0;i<14;i++) {
                ctx.fillStyle = "#ffdd99";
                ctx.beginPath();
                ctx.arc(28 + i*42, height-28, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ffb347";
                ctx.beginPath();
                ctx.arc(28 + i*42, height-28, 2.2, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        function animate() {
            frames++;
            if(frames % SPAWN_RATE === 0 && vontadesAtivas.length < MAX_VONTADES_TELA) {
                spawnVontade();
            }
            updateMovimento();
            drawBackground();
            drawVontades();
            drawBag();
            
            ctx.font = "italic 12px 'Quicksand'";
            ctx.fillStyle = "#b87c48";
            ctx.shadowBlur = 0;
            ctx.fillText("✨ toque nos desejos ✨", 20, 32);
            
            animationId = requestAnimationFrame(animate);
        }
        
        // Eventos
        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleCanvasClick({ clientX: touch.clientX, clientY: touch.clientY, touches: null });
        });
        
        // Clique na mensagem avança
        msgDiv.addEventListener('click', avancarMensagem);
        msgDiv.addEventListener('touchstart', (e) => {
            e.preventDefault();
            avancarMensagem();
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            vontadesGuardadas = 0;
            vontadesAtivas = [];
            desejosVoando = [];
            updateUI();
            setMensagemPermanente("Nova bolsa amarela! Vontades renascem 🌼", "#b28046");
            for(let i=0;i<3;i++) spawnVontade();
        });
        
        for(let i=0;i<3;i++) spawnVontade();
        updateUI();
        animate();
    })();
</script>
</body>
</html>
